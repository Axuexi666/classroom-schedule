function searchSchedule() {
  const key = document.getElementById("key").value.trim().toLowerCase();
  const resultBox = document.getElementById("result");
  
  // 清空结果
  resultBox.innerHTML = "";
  
  // 判空
  if (!key) {
    resultBox.innerHTML = '<div class="empty">请输入班级/教师姓名/机房号进行查询</div>';

  }
  
  // 智能拆分关键词：

  const aliasMap = {
   // 教育类
    "小教": "小学教育",

    // 经管与服务类
    "旅游": "旅游管理",
    "市营": "市场营销",
    "物流": "现代物流管理",
    "空乘": "空中乘务"
  };
  
 // 2. 替换简称，再在数字和中文之间插入空格进行拆分
  let processedKey = key;
  for (const [short, full] of Object.entries(aliasMap)) {
    processedKey = processedKey.replace(new RegExp(short, 'g'), full);
  }
  processedKey = processedKey.replace(/(\d)([^\d])/g, '$1 $2');
  processedKey = processedKey.replace(/([^\d])(\d)/g, '$1 $2');
  
  const keywords = processedKey.split(/\s+/).filter(k => k);
  
  if (keywords.length === 0) {
    resultBox.innerHTML = '<div class="empty">请输入有效关键词</div>';
    return;
  }

  const filterData = scheduleData.filter(item => {

    const className = item.class.toLowerCase();

    // 机房号精确匹配：如果关键词是“机房7”，则只匹配room字段

      return room === key;
    }
    
    // 其他情况：所有关键词都必须在某条记录中出现，才会被匹配
    const combinedText = [room, teacher, className, course].join(' ');
    return keywords.every(k => combinedText.includes(k));
  });
  
  // 无结果
  if (filterData.length === 0) {
    resultBox.innerHTML = '<div class="empty">未查询到相关上课信息\n请重新输入关键字：</div>';
    return;
  }
  
  // 渲染结果
  let html = "";
  filterData.forEach(item => {
    html += `
    <div class="item">
      <div class="title">
        <span>${item.week} ${item.section}</span>
        <span style="color:#4299e1">${item.room}</span>
      </div>
      <div class="info"><label>课程：</label>${item.course}</div>
      <div class="info"><label>教师：</label>${item.teacher}</div>
      <div class="info"><label>班级：</label>${item.class}</div>
      <div class="info"><label>周次：</label>${item.weekRange}</div>
    </div>
    `;
  });
  resultBox.innerHTML = html;
}

// 回车触发查询
document.getElementById("key").addEventListener("keydown", function(e) {
  if (e.key === "Enter") searchSchedule();
});
</script>
</body>
</html>
